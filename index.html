<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Almira Shidqiya</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Warna background bisa diubah */
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            overflow: hidden;
        }

        /* Desain kotak kaca transparan (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 40px 30px;
            text-align: center;
            width: 90%;
            max-width: 350px;
            animation: fadeIn 1.5s ease-in-out;
            z-index: 10;
        }

        /* Desain Foto */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            background-color: #eee;
        }

        h1 {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
        }

        p {
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.5;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        /* Desain Tombol */
        .btn {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 30px;
            background: #fff;
            color: #ff7eb3;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Animasi Background Melayang */
        .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -100px;
            font-size: 24px;
            animation: floatUp 5s infinite linear;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts-bg"></div>

    <div class="card">
        <img src="ISI_URL_GAMBAR_DISINI" alt="Almira Shidqiya" class="profile-img">
        
        <h1>Almira Shidqiya</h1>
        <p>You are special, have a beautiful day! ✨</p>
        
        <a href="ISI_URL_TUJUAN_DISINI" class="btn">Click Here</a>
    </div>

    <script>
        const heartsBg = document.getElementById('hearts-bg');
        const heartSymbols = ['🤍', '✨', '🌸', '🦋', '💖']; // Bisa diganti iconnya

        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's'; // Kecepatan melayang
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px'; // Ukuran random
            
            heartsBg.appendChild(heart);

            // Menghapus elemen setelah selesai melayang agar tidak lemot
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }, 400); // Kecepatan munculnya icon
    </script>
</body>
</html>
